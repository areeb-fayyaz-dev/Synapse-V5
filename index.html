<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNAPSE-V5 | Neural Lab</title>
    <style>
        :root { --neon: #00f2ff; --purple: #bc00ff; --bg: #030305; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* Original Grid Background */
        .grid { position: fixed; width: 200%; height: 200%; background-image: linear-gradient(#111 1px, transparent 1px), linear-gradient(90deg, #111 1px, transparent 1px); background-size: 50px 50px; z-index: -1; animation: move 20s linear infinite; }
        @keyframes move { from { transform: translate(0,0); } to { transform: translate(-50px, -50px); } }

        .header { position: absolute; top: 30px; text-align: center; z-index: 2; width: 100%; }
        .header h1 { font-size: 28px; letter-spacing: 5px; margin: 0; color: var(--purple); text-shadow: 0 0 15px var(--purple); }
        .areeb-tag { font-size: 10px; color: #444; letter-spacing: 3px; margin-top: 5px; }

        /* The Neuron Core */
        .neuron-node { width: 200px; height: 200px; border: 1px solid #222; border-radius: 50%; position: relative; transition: 0.3s; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); z-index: 5; }
        
        /* Firing Animation */
        .firing { border-color: var(--neon) !important; box-shadow: 0 0 60px var(--neon), inset 0 0 20px var(--neon) !important; transform: scale(1.1); }
        
        .pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--neon); opacity: 0; pointer-events: none; }
        .firing .pulse { animation: ripple 0.6s ease-out; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        .hud { position: fixed; bottom: 40px; text-align: center; width: 100%; pointer-events: none; }
        #output { font-size: 50px; font-weight: bold; color: #111; transition: 0.2s; }
        .firing-text { color: var(--neon) !important; text-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body>
    <div class="grid"></div>
    
    <div class="header">
        <h1>SYNAPSE-V5</h1>
        <div class="areeb-tag">System Architect: areeb</div>
    </div>

    <!-- Mouse over for Laptop, Click/Touch for Mobile -->
    <div id="main-neuron" class="neuron-node" 
         onmouseenter="triggerFire()" 
         onclick="triggerFire()">
        <div class="pulse"></div>
        <div id="status" style="font-size: 14px; color: #333;">IDLE</div>
    </div>
    
    <div class="hud">
        <div id="output">0.00V</div>
        <div style="font-size: 10px; color: #333; letter-spacing: 3px; margin-top: 10px;">NEUROMORPHIC PULSE INTERFACE</div>
    </div>

    <script>
        let busy = false;

        function triggerFire() {
            if (busy) return;
            busy = true;

            const node = document.getElementById('main-neuron');
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            
            node.classList.add('firing');
            status.innerText = "FIRING";
            status.style.color = "var(--neon)";
            output.innerText = "5.00V";
            output.classList.add('firing-text');

            // Auto reset after pulse
            setTimeout(() => {
                node.classList.remove('firing');
                status.innerText = "IDLE";
                status.style.color = "#333";
                output.innerText = "0.00V";
                output.classList.remove('firing-text');
                busy = false;
            }, 700);
        }
    </script>
</body>
</html>
